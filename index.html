<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda DL — Downloads</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#09090f;
  --surface:#111118;
  --surface2:#18181f;
  --border:#222230;
  --border2:#32324a;
  --accent:#6ee7b7;
  --accent2:#34d399;
  --text:#f0f0f8;
  --text2:#c8c8e0;
  --muted:#7070a0;
  --faint:#404060;
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* BG GRID */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;
  opacity:0.3;pointer-events:none;z-index:0;
}

.wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:3rem 2rem;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4rem;}
.brand{display:flex;align-items:center;gap:14px;}
.brand-icon{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,#6ee7b7,#3b82f6);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 24px rgba(110,231,183,0.25);
}
.brand-icon svg{width:22px;height:22px;fill:white;}
.brand-name{font-size:22px;font-weight:700;letter-spacing:-0.03em;color:var(--text);}
.brand-name span{color:var(--accent);}
.admin-link{
  display:flex;align-items:center;gap:7px;
  padding:8px 16px;
  border:1px solid var(--border2);
  border-radius:8px;
  color:var(--muted);
  font-size:13px;
  text-decoration:none;
  transition:all 0.2s;
}
.admin-link:hover{border-color:var(--accent);color:var(--accent);}
.admin-link svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}

/* HERO */
.hero{text-align:center;margin-bottom:3.5rem;}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(110,231,183,0.08);
  border:1px solid rgba(110,231,183,0.2);
  border-radius:20px;padding:5px 14px;
  font-size:12px;color:var(--accent);
  margin-bottom:1.25rem;font-family:'JetBrains Mono',monospace;
}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.hero h1{font-size:clamp(2rem,5vw,3.2rem);font-weight:700;letter-spacing:-0.04em;line-height:1.1;margin-bottom:1rem;}
.hero h1 em{font-style:normal;color:var(--accent);}
.hero p{font-size:15px;color:var(--muted);max-width:420px;margin:0 auto;}

/* SEARCH */
.search-wrap{max-width:480px;margin:0 auto 2.5rem;}
.search-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:12px;padding:12px 16px;
  transition:border-color 0.2s;
}
.search-bar:focus-within{border-color:var(--accent);}
.search-bar svg{width:16px;height:16px;stroke:var(--faint);fill:none;stroke-width:2;flex-shrink:0;}
.search-bar input{background:none;border:none;outline:none;color:var(--text);font-size:14px;font-family:'Sora',sans-serif;width:100%;}
.search-bar input::placeholder{color:var(--faint);}

/* FILTERS */
.filter-row{display:flex;gap:8px;justify-content:center;margin-bottom:2.5rem;flex-wrap:wrap;}
.filter-btn{
  padding:6px 16px;border-radius:20px;font-size:12px;font-weight:500;
  border:1px solid var(--border);background:none;color:var(--muted);
  cursor:pointer;transition:all 0.15s;font-family:'Sora',sans-serif;
}
.filter-btn.active,.filter-btn:hover{background:var(--surface2);color:var(--text2);border-color:var(--border2);}

/* STATS BAR */
.stats-bar{display:flex;gap:2rem;justify-content:center;margin-bottom:2rem;}
.stat{font-size:12px;color:var(--faint);font-family:'JetBrains Mono',monospace;}
.stat b{color:var(--accent);font-weight:500;}

/* FILE GRID */
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}

.file-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;padding:1.25rem;
  transition:all 0.2s;
  position:relative;overflow:hidden;
  animation:fadeUp 0.4s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

.file-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,0.4);}

.file-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(110,231,183,0.04),transparent);
  opacity:0;transition:opacity 0.2s;pointer-events:none;
}
.file-card:hover::after{opacity:1;}

.file-type-bar{
  position:absolute;top:0;left:0;right:0;height:2px;
  border-radius:16px 16px 0 0;
}
.bar-pdf{background:#f87171;}
.bar-img{background:#a78bfa;}
.bar-doc{background:#60a5fa;}
.bar-zip{background:#fb923c;}
.bar-other{background:var(--accent);}

.file-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;margin-top:6px;}
.file-icon{
  width:42px;height:42px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;
  letter-spacing:0.05em;flex-shrink:0;
}
.icon-pdf{background:rgba(248,113,113,0.12);color:#f87171;}
.icon-img{background:rgba(167,139,250,0.12);color:#a78bfa;}
.icon-doc{background:rgba(96,165,250,0.12);color:#60a5fa;}
.icon-zip{background:rgba(251,146,60,0.12);color:#fb923c;}
.icon-other{background:rgba(110,231,183,0.12);color:var(--accent);}

.file-info{flex:1;min-width:0;}
.file-name{font-size:14px;font-weight:500;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.file-meta{font-size:11px;color:var(--faint);font-family:'JetBrains Mono',monospace;}

.dl-btn{
  width:100%;padding:10px;
  background:rgba(110,231,183,0.08);
  border:1px solid rgba(110,231,183,0.2);
  border-radius:10px;
  color:var(--accent);
  font-size:13px;font-weight:500;
  font-family:'Sora',sans-serif;
  cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.dl-btn:hover{background:rgba(110,231,183,0.15);border-color:var(--accent);}
.dl-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2;}

/* EMPTY / LOADING */
.center-msg{text-align:center;padding:5rem 2rem;color:var(--faint);}
.center-msg svg{width:52px;height:52px;stroke:var(--border2);fill:none;stroke-width:1;margin:0 auto 1rem;display:block;}
.center-msg p{font-size:14px;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}

/* FOOTER */
footer{text-align:center;margin-top:4rem;padding-top:2rem;border-top:1px solid var(--border);font-size:12px;color:var(--faint);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div class="brand-name">Panda<span>DL</span></div>
    </div>
    <a href="admin.html" class="admin-link">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      Admin
    </a>
  </header>

  <div class="hero">
    <div class="hero-badge">● Files available for download</div>
    <h1>Download your <em>files</em><br>instantly</h1>
    <p>Browse and download all available files. No account needed.</p>
  </div>

  <div class="search-wrap">
    <div class="search-bar">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search files…">
    </div>
  </div>

  <div class="filter-row" id="filter-row">
    <button class="filter-btn active" data-type="all">All</button>
    <button class="filter-btn" data-type="pdf">PDF</button>
    <button class="filter-btn" data-type="img">Images</button>
    <button class="filter-btn" data-type="doc">Docs</button>
    <button class="filter-btn" data-type="zip">Archives</button>
    <button class="filter-btn" data-type="other">Other</button>
  </div>

  <div class="stats-bar">
    <div class="stat"><b id="file-count">0</b> files</div>
    <div class="stat"><b id="total-size">0 KB</b> total</div>
  </div>

  <div id="file-grid" class="file-grid">
    <div class="center-msg" id="loading-msg">
      <div class="spinner"></div>
      <p>Loading files…</p>
    </div>
  </div>

  <footer>PandaDL &mdash; Powered by GitHub</footer>
</div>

<script>
const OWNER = 'masoomshah1312';
const REPO = 'download';
const BRANCH = 'main';
const FILES_PATH = 'uploads'; // folder in repo where files live

let allFiles = [];
let activeFilter = 'all';
let searchQuery = '';

function getType(name) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  if (['pdf'].includes(ext)) return 'pdf';
  if (['jpg','jpeg','png','gif','svg','webp','bmp','ico'].includes(ext)) return 'img';
  if (['doc','docx','txt','md','xls','xlsx','ppt','pptx','csv','rtf'].includes(ext)) return 'doc';
  if (['zip','rar','gz','tar','7z','bz2'].includes(ext)) return 'zip';
  return 'other';
}

function formatSize(bytes) {
  if (!bytes) return '—';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  return new Date(dateStr).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function typeLabel(t) { return {pdf:'PDF',img:'IMG',doc:'DOC',zip:'ZIP',other:'FILE'}[t]; }
function typeIconClass(t) { return {pdf:'icon-pdf',img:'icon-img',doc:'icon-doc',zip:'icon-zip',other:'icon-other'}[t]; }
function typeBarClass(t) { return {pdf:'bar-pdf',img:'bar-img',doc:'bar-doc',zip:'bar-zip',other:'bar-other'}[t]; }

async function loadFiles() {
  try {
    const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILES_PATH}?ref=${BRANCH}`, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!r.ok) { showEmpty('No files found yet.'); return; }
    const data = await r.json();
    allFiles = data.filter(f => f.type === 'file').map(f => ({
      name: f.name,
      size: f.size,
      download_url: f.download_url,
      sha: f.sha,
      type: getType(f.name)
    }));
    render();
  } catch(e) {
    showEmpty('Could not load files. Check your connection.');
  }
}

function showEmpty(msg) {
  const grid = document.getElementById('file-grid');
  grid.innerHTML = `<div class="center-msg" style="grid-column:1/-1">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <p>${msg}</p>
  </div>`;
  document.getElementById('file-count').textContent = '0';
  document.getElementById('total-size').textContent = '0 KB';
}

function render() {
  const grid = document.getElementById('file-grid');
  const filtered = allFiles.filter(f => {
    const tm = activeFilter === 'all' || f.type === activeFilter;
    const sm = f.name.toLowerCase().includes(searchQuery.toLowerCase());
    return tm && sm;
  });

  document.getElementById('file-count').textContent = filtered.length;
  const total = filtered.reduce((s,f) => s + (f.size||0), 0);
  document.getElementById('total-size').textContent = formatSize(total);

  if (filtered.length === 0) { showEmpty('No files match your search.'); return; }

  grid.innerHTML = filtered.map((f, i) => `
    <div class="file-card" style="animation-delay:${i*0.05}s">
      <div class="file-type-bar ${typeBarClass(f.type)}"></div>
      <div class="file-top">
        <div class="file-icon ${typeIconClass(f.type)}">${typeLabel(f.type)}</div>
        <div class="file-info">
          <div class="file-name" title="${f.name}">${f.name}</div>
          <div class="file-meta">${formatSize(f.size)}</div>
        </div>
      </div>
      <a href="${f.download_url}" download="${f.name}" class="dl-btn">
        <svg viewBox="0 0 24 24"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0018 9h-1.26A8 8 0 103 16.29"/></svg>
        Download
      </a>
    </div>
  `).join('');
}

document.getElementById('search').addEventListener('input', e => { searchQuery = e.target.value; render(); });
document.getElementById('filter-row').addEventListener('click', e => {
  if (!e.target.dataset.type) return;
  activeFilter = e.target.dataset.type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.type === activeFilter));
  render();
});

loadFiles();
</script>
</body>
</html>
